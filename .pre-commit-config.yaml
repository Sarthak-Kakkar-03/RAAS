exclude: ^(api/venv/|api/__pycache__/|api/.*/__pycache__/|\.git/)
repos:
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-json
-   repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
    -   id: black
