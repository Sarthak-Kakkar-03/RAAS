services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    working_dir: /app
    command: >
      sh -c "uv sync --frozen &&
      uv run uvicorn api.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - UV_PROJECT_ENVIRONMENT=/tmp/.venv
    ports:
      - "8000:8000"
    depends_on:
      - chroma

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

volumes:
  chroma_data:
